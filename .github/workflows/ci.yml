name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin and pytest
        run: pip install maturin pytest pytest-asyncio

      - name: Build wheel
        working-directory: python
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-asyncio
          .venv/bin/maturin build --release --features python-ext

      - name: Install extension and run pytest
        working-directory: python
        run: |
          .venv/bin/maturin develop --release --features python-ext
          .venv/bin/pytest -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: maggraph-wheel
          path: python/target/wheels/*.whl
          if-no-files-found: error
